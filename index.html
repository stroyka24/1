<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AFRICA PRIVÉ | Клуб частных путешествий в Африку</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #0F0A0F; color: #D1C4B0; overflow-x: hidden; }

        /* ========== ПРЕЛОАДЕР ========== */
        .preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0A080C;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 1.5s ease;
            overflow: hidden;
        }
        .preloader.hide { opacity: 0; visibility: hidden; pointer-events: none; }

        .video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        .preloader-video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.85) contrast(1.2) saturate(0.9) sepia(0.3);
            transform: scale(1.02);
            animation: slowZoom 12s ease-out forwards;
        }
        @keyframes slowZoom {
            0% { transform: scale(1.02); }
            100% { transform: scale(1.15); }
        }

        /* Винтажные эффекты */
        .film-grain {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0px, rgba(255,255,255,0.05) 1px, transparent 2px);
            background-size: 4px 4px;
            pointer-events: none;
            z-index: 3;
            animation: grainShift 0.3s steps(2) infinite;
        }
        @keyframes grainShift { 0% { transform: translate(0,0); } 100% { transform: translate(1px,-1px); } }

        .film-scratches {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 3;
            animation: scratchesMove 4s linear infinite;
        }
        @keyframes scratchesMove { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .vhs-effect {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(255,0,0,0.05) 0%, rgba(0,255,0,0.05) 25%, rgba(0,0,255,0.05) 50%, rgba(255,0,0,0.05) 75%, rgba(0,255,0,0.05) 100%);
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 3;
            animation: vhsShift 0.2s steps(2) infinite;
        }
        @keyframes vhsShift { 0% { transform: translateX(0); opacity:0.3; } 100% { transform: translateX(2px); opacity:0.5; } }

        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 3;
            animation: scanlinesMove 8s linear infinite;
        }
        @keyframes scanlinesMove { 0% { transform: translateY(0); } 100% { transform: translateY(10px); } }

        .light-leak {
            position: absolute;
            top: 0; left: -30%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, rgba(255,160,80,0.2) 0%, rgba(255,120,40,0.1) 30%, transparent 70%);
            transform: skewX(-15deg);
            pointer-events: none;
            z-index: 2;
            animation: lightLeakMove 6s ease-in-out infinite;
        }
        @keyframes lightLeakMove {
            0% { left: -40%; opacity: 0; }
            20% { opacity: 0.6; }
            40% { left: 100%; opacity: 0.3; }
            100% { left: 100%; opacity: 0; }
        }

        .film-shake {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            animation: shake 0.15s steps(2) infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(1px,-1px); }
            50% { transform: translate(-1px,1px); }
            75% { transform: translate(1px,1px); }
            100% { transform: translate(0,0); }
        }

        .preloader-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(10,8,12,0.3) 0%, rgba(10,8,12,0.7) 100%);
            z-index: 1;
        }

        .dust-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        .tape-indicator {
            position: absolute;
            bottom: 20px; left: 20px;
            z-index: 10;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(230,126,74,0.7);
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            border-left: 2px solid #E67E4A;
            pointer-events: none;
        }
        .tape-indicator .recording {
            display: inline-block;
            width: 8px; height: 8px;
            background: #E67E4A;
            border-radius: 50%;
            margin-right: 8px;
            animation: recordingPulse 1s ease infinite;
        }
        @keyframes recordingPulse { 0%,100% { opacity:0.4; transform:scale(0.8); } 50% { opacity:1; transform:scale(1.2); } }

        .film-controls {
            position: absolute;
            bottom: 20px; right: 20px;
            z-index: 10;
            display: flex;
            gap: 8px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(230,126,74,0.6);
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .film-controls span { animation: blink 1.5s step-start infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        .preloader-content {
            position: relative;
            z-index: 20;
            text-align: center;
            max-width: 700px;
            padding: 40px;
            backdrop-filter: blur(12px);
            background: rgba(15,10,15,0.5);
            border-radius: 40px;
            border: 1px solid rgba(230,126,74,0.3);
            animation: contentPulse 2s ease-in-out infinite;
        }
        @keyframes contentPulse { 0%,100% { box-shadow:0 0 20px rgba(230,126,74,0.1); border-color:rgba(230,126,74,0.3); } 50% { box-shadow:0 0 40px rgba(230,126,74,0.4); border-color:rgba(230,126,74,0.7); } }

        .preloader-logo {
            font-family: 'Playfair Display', serif;
            font-size: 68px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #FEF2E0;
            text-shadow: 0 0 40px rgba(230,126,74,0.6), 2px 2px 0 rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: logoReveal 1.5s ease forwards;
        }
        @keyframes logoReveal { 0% { opacity:0; transform:translateY(40px) scale(0.9); filter:blur(8px); letter-spacing:20px; } 100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); letter-spacing:6px; } }
        .preloader-logo span { color: #E67E4A; }

        .preloader-tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #E67E4A;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards 0.4s;
        }
        .sand-line {
            width: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #E67E4A, #FF9F6E, #E67E4A, transparent);
            margin: 0 auto 30px;
            animation: lineGrow 1.5s ease-out forwards 0.6s;
        }
        @keyframes lineGrow { to { width: 200px; } }

        .preloader-percent {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 300;
            color: #FEF2E0;
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 0.8s;
        }
        .preloader-percent span { font-size: 56px; font-weight: 700; color: #E67E4A; text-shadow: 0 0 20px rgba(230,126,74,0.5); }
        .preloader-status {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(254,242,224,0.7);
            margin-top: 16px;
        }
        .preloader-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
        }
        .preloader-dots span {
            width: 8px; height: 8px;
            background: #E67E4A;
            border-radius: 50%;
            animation: dotPulse 1s ease infinite;
        }
        .preloader-dots span:nth-child(1) { animation-delay:0s; }
        .preloader-dots span:nth-child(2) { animation-delay:0.2s; }
        .preloader-dots span:nth-child(3) { animation-delay:0.4s; }
        .preloader-dots span:nth-child(4) { animation-delay:0.6s; }
        @keyframes dotPulse { 0%,100% { opacity:0.3; transform:scale(0.8); } 50% { opacity:1; transform:scale(1.2); background:#FF9F6E; } }

        @keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        .main-content { opacity: 0; transition: opacity 1.2s ease; }
        .main-content.visible { opacity: 1; }
        .container { max-width: 1280px; margin: 0 auto; padding: 60px 24px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 56px; color: #FEF2E0; }
        .btn { display: inline-block; padding: 14px 40px; background: linear-gradient(135deg, #E67E4A 0%, #D45A2A 100%); color: white; text-decoration: none; border-radius: 40px; margin-top: 30px; font-weight: 600; transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(230,126,74,0.4); }

        @media (max-width: 768px) {
            .preloader-logo { font-size: 40px; letter-spacing: 4px; }
            .preloader-percent span { font-size: 40px; }
            h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

<div class="preloader" id="preloader">
    <div class="video-container">
        <!-- ПРЯМАЯ ССЫЛКА НА ВАШЕ ВИДЕО С GITHUB -->
        <video class="preloader-video" autoplay muted loop playsinline id="preloaderVideo">
            <source src="https://github.com/stroyka24/1/raw/main/assets/hero.MP4" type="video/mp4">
        </video>
    </div>

    <div class="film-grain"></div>
    <div class="film-scratches"></div>
    <div class="vhs-effect"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="light-leak"></div>
    <div class="film-shake"></div>
    <div class="preloader-overlay"></div>
    <div class="dust-container" id="dustContainer"></div>

    <div class="tape-indicator">
        <span class="recording"></span>
        <span>AFRICA PRIVÉ • ARCHIVE • 8mm</span>
    </div>
    <div class="film-controls">
        <span>◀◀</span> <span>REC</span> <span>●</span> <span>▶▶</span>
        <span style="margin-left: 8px;">00:00:12</span>
    </div>

    <div class="preloader-content">
        <div class="preloader-logo">AFRICA <span>PRIVÉ</span></div>
        <div class="preloader-tagline">Клуб частных путешествий</div>
        <div class="sand-line"></div>
        <div class="preloader-percent"><span id="loadingPercent">0</span>%</div>
        <div class="preloader-status" id="loadingStatus">Загрузка архивной плёнки...</div>
        <div class="preloader-dots"><span></span><span></span><span></span><span></span></div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="container">
        <h1>AFRICA PRIVÉ</h1>
        <p style="font-size: 18px; margin-top: 20px;">Ваше частное путешествие в сердце Африки</p>
        <a href="#" class="btn">Начать экспедицию</a>
    </div>
</div>

<script>
(function() {
    // ========== ПЫЛЬ И ПЕСОК ==========
    const dustContainer = document.getElementById('dustContainer');
    if (dustContainer) {
        function createDustCluster() {
            const dust = document.createElement('div');
            dust.style.cssText = `
                position: absolute;
                background: radial-gradient(ellipse at center, rgba(230,126,74,0.5) 0%, rgba(210,90,40,0.2) 40%, transparent 70%);
                border-radius: 50%;
                width: ${Math.random() * 60 + 30}px;
                height: ${Math.random() * 60 + 30}px;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 80 + 10}%;
                filter: blur(5px);
                animation: dustFloat ${Math.random() * 5 + 4}s ease-in-out infinite;
                opacity: 0;
                pointer-events: none;
            `;
            dustContainer.appendChild(dust);
            setTimeout(() => dust.remove(), 8000);
        }
        function createSandParticle() {
            const particle = document.createElement('div');
            const dx = (Math.random() * 150 - 75);
            const dy = -(Math.random() * 80 + 40);
            particle.style.cssText = `
                position: absolute;
                background: radial-gradient(ellipse at center, #E67E4A 0%, #B85C2A 60%, transparent 80%);
                border-radius: 50%;
                width: ${Math.random() * 5 + 2}px;
                height: ${Math.random() * 5 + 2}px;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 80 + 10}%;
                filter: blur(1px);
                animation: sandBlow ${Math.random() * 2 + 2}s ease-out forwards;
                pointer-events: none;
            `;
            dustContainer.appendChild(particle);
            setTimeout(() => particle.remove(), 4000);
        }
        const style = document.createElement('style');
        style.textContent = `
            @keyframes dustFloat {
                0% { opacity: 0; transform: translateY(0) scale(0.8); }
                20% { opacity: 0.6; }
                80% { opacity: 0.3; }
                100% { opacity: 0; transform: translateY(-120px) scale(1.4); }
            }
            @keyframes sandBlow {
                0% { opacity: 0.8; transform: translateX(0) translateY(0); }
                100% { opacity: 0; transform: translateX(${dx}px) translateY(${dy}px); }
            }
        `;
        document.head.appendChild(style);
        setInterval(() => { if (!document.getElementById('preloader')?.classList.contains('hide')) createDustCluster(); }, 1000);
        setInterval(() => { if (!document.getElementById('preloader')?.classList.contains('hide')) for(let i=0;i<4;i++) createSandParticle(); }, 250);
    }

    // ========== ГЛАВНАЯ ЛОГИКА ЗАГРУЗКИ ==========
    let percent = 0;
    const percentElement = document.getElementById('loadingPercent');
    const statusElement = document.getElementById('loadingStatus');
    const preloader = document.getElementById('preloader');
    const mainContent = document.getElementById('mainContent');
    
    const statusMessages = [
        { at: 0, text: '🎞️ Загрузка архивной плёнки...' },
        { at: 15, text: '📼 Оцифровка кадров саванны...' },
        { at: 30, text: '🎬 Восстановление плёнки 8mm...' },
        { at: 45, text: '🦁 Поиск Большой пятёрки...' },
        { at: 60, text: '🌅 Цветокоррекция африканского заката...' },
        { at: 75, text: '✨ Добавление винтажного шума...' },
        { at: 90, text: '📀 Почти готово...' },
        { at: 100, text: '✓ AFRICA PRIVÉ | Плёнка готова' }
    ];
    
    function updateStatus(currentPercent) {
        if (!statusElement) return;
        for (let i = statusMessages.length - 1; i >= 0; i--) {
            if (currentPercent >= statusMessages[i].at) {
                statusElement.textContent = statusMessages[i].text;
                break;
            }
        }
    }
    
    function finishLoading() {
        console.log('Завершение загрузки, показываем основной контент');
        if (preloader) preloader.classList.add('hide');
        if (mainContent) mainContent.classList.add('visible');
        setTimeout(() => {
            if (preloader && preloader.parentNode) preloader.style.display = 'none';
        }, 1000);
    }
    
    // Функция увеличения процентов
    function increasePercent() {
        if (percent >= 100) return;
        percent = Math.min(percent + Math.floor(Math.random() * 8) + 3, 100);
        if (percentElement) percentElement.textContent = percent;
        updateStatus(percent);
        
        if (percent >= 100) {
            finishLoading();
        } else {
            // Продолжаем увеличивать
            setTimeout(increasePercent, Math.random() * 150 + 80);
        }
    }
    
    // Запускаем увеличение процентов
    setTimeout(increasePercent, 200);
    
    // Ждём видео (если есть) и в любом случае завершаем через 5 секунд
    const video = document.getElementById('preloaderVideo');
    if (video) {
        video.addEventListener('canplaythrough', () => {
            console.log('Видео загружено');
            // Не завершаем сразу, даём процентам дойти
        });
        video.addEventListener('error', () => {
            console.warn('Видео не загрузилось, но продолжаем');
        });
    }
    
    // Абсолютный аварийный выход через 6 секунд (на случай, если проценты застряли)
    setTimeout(() => {
        if (preloader && !preloader.classList.contains('hide')) {
            console.log('Аварийный выход: принудительно показываем контент');
            finishLoading();
        }
    }, 6000);
    
    // Также добавим обработчик, если проценты дошли до 100, но по какой-то причине finishLoading не сработал
    const checkComplete = setInterval(() => {
        if (percent >= 100 && preloader && !preloader.classList.contains('hide')) {
            clearInterval(checkComplete);
            finishLoading();
        }
    }, 100);
})();
</script>
</body>
</html>
